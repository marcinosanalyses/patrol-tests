name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Show tool versions
        run: |
          flutter --version
          dart --version
          node --version
          npm --version

      - name: Install dependencies
        run: flutter pub get

      - name: Install Patrol CLI
        run: |
          dart pub global activate patrol_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Run widget + Patrol web tests
        env:
          PATROL_ANALYTICS_ENABLED: "false"
        run: ./scripts/run_tests_with_report.sh

      - name: Upload Patrol web report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patrol-web-report
          path: |
            build/patrol_web_report
            build/patrol_web_results
          if-no-files-found: warn
