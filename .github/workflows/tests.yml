name: Tests

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  patrol-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          dart --version
          node --version
          npm --version

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Patrol CLI
        run: |
          dart pub global activate patrol_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"
          patrol --version

      - name: Enable Flutter web device
        run: |
          flutter config --enable-web
          flutter precache --web
          flutter devices

      - name: Run Patrol web tests
        id: tests_step
        env:
          CI: "true"
          PATROL_ANALYTICS_ENABLED: "false"
          PATROL_PRINT_LOGS: "true"
        run: |
          TESTS_EXIT_CODE=0
          patrol test --target patrol_test/web/text_fixer_test.dart -d chrome --verbose --web-headless true --web-workers 1 --web-locale en-US --web-report-dir build/patrol_web_report --web-results-dir build/patrol_web_results --web-reporter '["html","json","list"]' || TESTS_EXIT_CODE=$?
          echo "TESTS_EXIT_CODE=$TESTS_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $TESTS_EXIT_CODE

      - name: Upload Patrol web report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patrol-web-report
          path: |
            build/patrol_web_report
            build/patrol_web_results
          retention-days: 7
          if-no-files-found: warn