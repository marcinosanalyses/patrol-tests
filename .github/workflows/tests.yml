name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  widget-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure git safe.directory for Flutter SDK
        run: |
          if [ -n "${FLUTTER_ROOT:-}" ] && [ -d "${FLUTTER_ROOT}" ]; then
            git config --global --add safe.directory "${FLUTTER_ROOT}"
          fi
          if [ -d /__t/flutter ]; then
            find /__t/flutter -maxdepth 2 -type d -name flutter -print0 | while IFS= read -r -d '' dir; do
              git config --global --add safe.directory "$dir"
            done
          fi

      - name: Show tool versions
        run: |
          flutter --version
          dart --version

      - name: Install dependencies
        run: flutter pub get

      - name: Run widget tests
        env:
          CI: "true"
        run: |
          mkdir -p build/ci_logs
          set -o pipefail
          flutter test |& tee build/ci_logs/flutter_test.log

      - name: Upload widget test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: widget-test-logs
          path: build/ci_logs
          if-no-files-found: warn

  patrol-web:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: widget-tests
    env:
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: "1"
    defaults:
      run:
        shell: bash
    container:
      image: mcr.microsoft.com/playwright:v1.56.0-jammy
      options: --user 0 --ipc=host

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install container prerequisites for flutter-action
        run: |
          apt-get update
          apt-get install -y jq xz-utils

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Configure git safe.directory for Flutter SDK
        run: |
          if [ -n "${FLUTTER_ROOT:-}" ] && [ -d "${FLUTTER_ROOT}" ]; then
            git config --system --add safe.directory "${FLUTTER_ROOT}"
            git config --global --add safe.directory "${FLUTTER_ROOT}"
          fi

      - name: Show tool versions
        run: |
          flutter --version
          dart --version
          node --version
          npm --version

      - name: Install dependencies
        run: flutter pub get

      - name: Install Patrol CLI
        run: |
          dart pub global activate patrol_cli
          echo "$HOME/.pub-cache/bin" >> "$GITHUB_PATH"

      - name: Show Patrol version
        run: patrol --version

      - name: Verify Patrol web_runner Playwright install and launch
        env:
          PATROL_WEB_BROWSER_ARGS: '["--no-sandbox","--disable-setuid-sandbox","--disable-dev-shm-usage","--disable-gpu","--use-gl=swiftshader","--enable-unsafe-swiftshader"]'
        run: |
          WEB_RUNNER_PATH="$(find "$PUB_CACHE/hosted/pub.dev" -maxdepth 2 -type d -path '*/patrol-*/web_runner' | head -n 1)"
          if [[ -z "$WEB_RUNNER_PATH" ]]; then
            echo "Could not find Patrol web_runner under $PUB_CACHE/hosted/pub.dev"
            exit 1
          fi

          echo "Using Patrol web_runner at: $WEB_RUNNER_PATH"
          cd "$WEB_RUNNER_PATH"

          npm install
          npx playwright install

          node -e 'const { chromium } = require("playwright"); (async () => { const browser = await chromium.launch({ headless: true, args: JSON.parse(process.env.PATROL_WEB_BROWSER_ARGS || "[]") }); console.log(await browser.version()); await browser.close(); })().catch((error) => { console.error(error); process.exit(1); });'

      - name: Configure Chrome for Flutter web
        run: |
          CHROME_BIN="$(find /ms-playwright -type f -path '*/chrome-linux/chrome' | head -n 1)"
          if [[ -z "${CHROME_BIN}" ]]; then
            echo "Could not find Playwright Chromium binary under /ms-playwright"
            exit 1
          fi

          ln -sf "${CHROME_BIN}" /usr/local/bin/google-chrome
          chmod +x /usr/local/bin/google-chrome

          flutter config --enable-web
          flutter devices

      - name: Run Patrol web tests
        env:
          PATROL_ANALYTICS_ENABLED: "false"
          PATROL_VERBOSE: "true"
          PATROL_PRINT_LOGS: "true"
          PATROL_WEB_TIMEOUT: "120000"
          PATROL_WEB_GLOBAL_TIMEOUT: "420000"
          PATROL_WEB_WORKERS: "1"
          PATROL_WEB_VIDEO: "retain-on-failure"
          PATROL_WEB_BROWSER_ARGS: '["--no-sandbox","--disable-setuid-sandbox","--disable-dev-shm-usage","--disable-gpu","--use-gl=swiftshader","--enable-unsafe-swiftshader"]'
          PATROL_NO_OUTPUT_TIMEOUT_SECONDS: "90"
          BROWSER_LOCALE: "en-US"
          DEBUG: "pw:browser*"
          CI: "true"
        run: |
          mkdir -p build/ci_logs
          set -o pipefail
          echo "==> Locale environment"
          echo "LANG=${LANG:-unset}"
          echo "LC_ALL=${LC_ALL:-unset}"
          echo "BROWSER_LOCALE=${BROWSER_LOCALE:-unset}"
          ./scripts/run_tests_with_report.sh --patrol-only --no-output-timeout-seconds 90 --target patrol_test/web/text_fixer_test.dart |& tee build/ci_logs/patrol_web.log

      - name: Debug Patrol build outputs
        if: always()
        run: |
          echo "==> Build directories"
          ls -la build || true
          echo "==> Patrol-related directories"
          find build -maxdepth 2 -type d -name 'patrol*' -print || true
          echo "==> Patrol-related files"
          find build -maxdepth 3 -type f \( -name '*.json' -o -name '*.html' -o -name '*.xml' -o -name '*.txt' \) | grep patrol || true

      - name: Upload Patrol web report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: patrol-web-report
          path: |
            build/patrol_web_report
            build/patrol_web_results
            build/patrol_web_report_diag
            build/patrol_web_results_core
            build/patrol_web_results_diag
          if-no-files-found: warn

      - name: Upload CI debug logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-debug-logs
          path: |
            build/ci_logs
            build/patrol_web_report/results.json
            build/patrol_web_results
          if-no-files-found: warn
