name: test patrol-web

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run_tests:
    name: Flutter ${{ matrix.flutter-version }} on Web
    runs-on: ubuntu-latest
    timeout-minutes: 30
  
    strategy:
      fail-fast: false
      matrix:
        flutter-version: ['3.38.x']
        flutter-channel: ['stable']

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ matrix.flutter-version }}
          channel: ${{ matrix.flutter-channel }}

      - name: Preload Flutter artifacts
        run: flutter precache --web

      - name: Install dependencies
        run: flutter pub get

      - name: Set up Patrol CLI
        run: |
          dart pub global activate patrol_cli
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Run web tests
        id: tests_step
        env:
          CI: true
          PATROL_ANALYTICS_ENABLED: false
        run: |
          TESTS_EXIT_CODE=0
          # Do not use tags here, tags do not work with patrol web tests
          patrol test --target patrol_test/web/text_fixer_test.dart -d chrome --verbose --web-headless true --web-workers 1 --web-locale en-US || TESTS_EXIT_CODE=$?

          echo "TESTS_EXIT_CODE=$TESTS_EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit $TESTS_EXIT_CODE

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.flutter-version }}
          path: playwright-report/
          retention-days: 7